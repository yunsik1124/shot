<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beat or Die: Reaver Final Overdrive</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; -webkit-user-select: none; }
        canvas { display: block; touch-action: none; width: 100vw; height: 100vh; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const imgReaver = new Image(); imgReaver.src = 'assets/reaver.png'; 
let assetsLoaded = false;
imgReaver.onload = () => assetsLoaded = true;

let width, height;
function resize() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
}
window.addEventListener('resize', resize);
resize();

// --- 오디오 엔진 ---
let audioCtx = null, masterGain = null;
const BPM = 125, BEAT_MS = 60000 / BPM;
let startTime = 0, nextAudioBeatTime = 0;
const LOOK_AHEAD = 0.1;

function setupAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
    masterGain.gain.value = 0.5;
}

function playHeavyKick(time) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    osc.frequency.setValueAtTime(180, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.15);
    g.gain.setValueAtTime(1.5, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
    osc.connect(g); g.connect(masterGain);
    osc.start(time); osc.stop(time + 0.3);
}

function playJudgmentSound(type) {
    if(!audioCtx || audioCtx.state !== 'running') return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    if(type === 'SUCCESS') {
        osc.frequency.setValueAtTime(1100, now);
        osc.frequency.linearRampToValueAtTime(500, now + 0.05);
        g.gain.setValueAtTime(0.3, now);
    } else {
        osc.type = 'square'; osc.frequency.setValueAtTime(130, now);
        g.gain.setValueAtTime(0.3, now);
    }
    g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    osc.connect(g); g.connect(masterGain);
    osc.start(); osc.stop(now + 0.1);
}

// --- 게임 변수 ---
let gameState = 'START';
let score = 0, combo = 0, feverLevel = 0; 
let currentBeat = 4, beatTimer = 0, lastTime = 0; 
let gameTimer = 60, enemies = [], particles = [], shakeTime = 0, isMissSpeedUp = false;
let judgmentText = "", judgmentAlpha = 0, judgmentY = 0;
let enemySpawnTimer = 0;

const COMMANDS = [
    { type: 'TAP', label: 'TAP', color: '#0FF' },
    { type: 'SWIPE_L', label: 'SWIPE ◀', color: '#F0F' },
    { type: 'SWIPE_R', label: 'SWIPE ▶', color: '#0F0' },
    { type: 'HOLD', label: 'HOLD', color: '#FF0' }
];
let currentPlan = [], nextPlan = [], inputResults = [0,0,0,0]; 
let touch = { startX: 0, startY: 0, active: false, handled: false };

function generatePlan() {
    const plan = [];
    const timeElapsed = 60 - gameTimer;
    for(let i=0; i<4; i++) {
        if(timeElapsed < 20) {
            if(i < 3) plan.push(COMMANDS[0]);
            else plan.push(COMMANDS[Math.floor(Math.random() * 3) + 1]);
        } else {
            plan.push(Math.random() < 0.5 ? COMMANDS[Math.floor(Math.random() * 3) + 1] : COMMANDS[0]);
        }
    }
    return plan;
}

function showJudgment(text) {
    judgmentText = text; judgmentAlpha = 1.2; judgmentY = height/2;
    if(text === "MISS") { isMissSpeedUp = true; playJudgmentSound('FAIL'); combo = 0; feverLevel = 0; shakeTime = 10; }
    else { isMissSpeedUp = false; playJudgmentSound('SUCCESS'); }
}

function checkInput(type) {
    if(gameState !== 'PLAY' || currentBeat >= 4 || touch.handled) return;
    if(inputResults[currentBeat] !== 0 && inputResults[currentBeat] !== 3) return;
    
    const diff = Math.abs(beatTimer - (BEAT_MS / 2));
    const target = currentPlan[currentBeat].type;

    if(target === type) {
        if (type === 'HOLD') { inputResults[currentBeat] = 3; return; }
        if (diff < 150) showJudgment("PERFECT"); 
        else if (diff < 250) showJudgment("GOOD");
        else { showJudgment("MISS"); inputResults[currentBeat] = 2; touch.handled = true; return; }
        
        inputResults[currentBeat] = 1;
        touch.handled = true;
        const xPos = (width * 0.1) + (width * 0.8 / 4) * currentBeat + (width * 0.8 / 8);
        for(let i=0; i<10; i++) particles.push({ x: xPos, y: height * 0.72, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color: currentPlan[currentBeat].color });
    } else if (type.startsWith('SWIPE') || (target === 'TAP' && type === 'TAP')) {
        showJudgment("MISS"); inputResults[currentBeat] = 2; touch.handled = true;
    }
}

function update(t) {
    const dt = t - lastTime; lastTime = t;
    if(gameState !== 'PLAY' || !audioCtx) return;

    const currentTime = audioCtx.currentTime;
    const elapsed = currentTime - startTime;

    while (nextAudioBeatTime < currentTime + LOOK_AHEAD) {
        playHeavyKick(nextAudioBeatTime);
        nextAudioBeatTime += BEAT_MS / 1000;
    }

    if (elapsed < 0) {
        const readyStartTime = startTime - (BEAT_MS * 4 / 1000);
        const readyElapsed = currentTime - readyStartTime;
        beatTimer = (readyElapsed * 1000) % BEAT_MS;
        currentBeat = 4 + Math.floor(readyElapsed / (BEAT_MS / 1000));
        return; 
    }

    beatTimer = (elapsed * 1000) % BEAT_MS;
    const newBeat = Math.floor((elapsed * 1000) / BEAT_MS) % 8;

    if (newBeat !== currentBeat) {
        if (currentBeat < 4) {
            if (inputResults[currentBeat] === 3) {
                if (touch.active) { showJudgment("PERFECT"); inputResults[currentBeat] = 1; }
                else { showJudgment("MISS"); inputResults[currentBeat] = 2; }
            } else if (inputResults[currentBeat] === 0) {
                showJudgment("MISS"); inputResults[currentBeat] = 2;
            }
        }
        currentBeat = newBeat;
        touch.handled = false; 
        if(currentBeat === 0) { currentPlan = [...nextPlan]; nextPlan = generatePlan(); inputResults = [0,0,0,0]; }
        if(currentBeat === 4) {
            if(inputResults.every(r => r === 1)) {
                combo++;
                feverLevel = combo >= 10 ? 2 : (combo >= 5 ? 1 : 0);
                let kCount = feverLevel === 2 ? 4 : (feverLevel === 1 ? 2 : 1);
                for(let k=0; k<kCount; k++) { if(enemies.length > 0) { enemies[0].hp--; if(enemies[0].hp <= 0) enemies.shift(); } }
                score += 200 * (feverLevel + 1);
            } else { combo = 0; feverLevel = 0; }
        }
    }

    gameTimer -= dt / 1000;
    if(gameTimer <= 0) { gameTimer = 0; gameState = 'FINISH'; }
    if(shakeTime > 0) shakeTime--;
    judgmentAlpha = Math.max(0, judgmentAlpha - dt/600);

    enemySpawnTimer += dt;
    if(enemySpawnTimer > (1400 + Math.random() * 800)) {
        enemies.push({ x: width + 100, y: (height * 0.15) + (Math.random() * (height * 0.3)), hp: Math.random() < 0.1 ? 2 : 1, offset: Math.random() * 10, speed: 85 + score/500 });
        enemySpawnTimer = 0;
    }

    particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.035; if(p.life <= 0) particles.splice(i, 1); });
    enemies.forEach(en => {
        en.x -= en.speed * (isMissSpeedUp ? 2.5 : 1.0) * (dt/1000) * (feverLevel === 2 ? 0.5 : (feverLevel === 1 ? 0.8 : 1.1));
        if(en.x < 80) gameState = 'GAMEOVER';
    });
}

function draw() {
    ctx.save();
    if(shakeTime > 0) ctx.translate((Math.random()-0.5)*shakeTime, (Math.random()-0.5)*shakeTime);
    ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, width, height);

    const wallX = 80;
    ctx.strokeStyle = feverLevel === 2 ? '#f00' : '#0ff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(wallX, 0); ctx.lineTo(wallX, height*0.45); ctx.stroke();

    enemies.forEach(en => {
        const time = Date.now() * 0.008 + en.offset;
        const sX = 1 + Math.sin(time) * 0.18, sY = 1 - Math.sin(time) * 0.18;
        ctx.save(); ctx.translate(en.x, en.y); ctx.scale(sX, sY);
        if (assetsLoaded) {
            if (en.hp > 1) ctx.filter = 'hue-rotate(270deg) saturate(2.5)';
            ctx.drawImage(imgReaver, -45, -45, 90, 90);
        } else {
            ctx.fillStyle = en.hp > 1 ? '#4B0082' : '#C49102';
            ctx.beginPath(); ctx.ellipse(0, 0, 45, 30, 0, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
        ctx.fillText('x' + en.hp, en.x, en.y - 55);
    });

    particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
    ctx.globalAlpha = 1;

    // --- 레일 UI ---
    const railY = height * 0.72, railX = width * 0.1, railW = width * 0.8, railH = 100;
    ctx.fillStyle = '#11111a'; ctx.fillRect(railX, railY - railH/2, railW, railH);
    for(let i=0; i<4; i++) {
        const segW = railW / 4, x = railX + segW * i, isActive = (currentBeat === i), cmd = currentPlan[i] || {label: ""};
        ctx.fillStyle = isActive ? 'rgba(255, 255, 255, 0.2)' : 'rgba(255, 255, 255, 0.05)';
        ctx.fillRect(x + segW/2 - 6, railY - railH/2, 12, railH);
        ctx.textAlign = 'center'; ctx.font = 'bold 15px Arial';
        ctx.fillStyle = isActive ? (inputResults[i] !== 0 ? '#fff' : cmd.color) : '#444';
        if(inputResults[i] === 2) ctx.fillStyle = '#f00';
        if(inputResults[i] === 3) {
             ctx.fillStyle = '#FF0';
             ctx.fillRect(x + 5, railY + 20, (segW - 10) * (beatTimer/BEAT_MS), 6);
        }
        ctx.fillText(cmd.label, x + segW/2, railY + 7);
    }

    ctx.globalAlpha = 0.4; ctx.fillStyle = '#aaa'; ctx.font = 'bold 12px Arial';
    for(let i=0; i<4; i++) if(nextPlan[i]) ctx.fillText("NEXT: " + nextPlan[i].label, railX + (railW/4)*i + (railW/8), railY + 85);
    ctx.globalAlpha = 1.0;

    // --- 가상(위) / 진짜(안) 타임바 궤도 분리 연출 ---
    const prog = beatTimer / BEAT_MS;
    const readyLineY = railY - 120; // 가상 타임바 높이 (레일 위 120px)

    if (audioCtx && (audioCtx.currentTime - startTime < 0 || currentBeat >= 4)) {
        // [가상 커맨드 / READY 구간]
        // 상단 가이드라인
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(railX, readyLineY); ctx.lineTo(railX + railW, readyLineY); ctx.stroke();
        ctx.setLineDash([]);

        const lx = railX + (railW/4) * (currentBeat % 4) + (railW/4) * prog;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 10; ctx.shadowBlur = 15; ctx.shadowColor = '#fff';
        ctx.beginPath(); ctx.moveTo(lx, readyLineY - 20); ctx.lineTo(lx, readyLineY + 20); ctx.stroke();
        ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center'; ctx.fillText("READY", lx, readyLineY - 30);
    } else {
        // [본 게임 / ATTACK 구간]
        const sx = railX + (railW/4) * (currentBeat % 4) + (railW/4) * prog;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 12; ctx.shadowBlur = 15; ctx.shadowColor = '#fff';
        ctx.beginPath(); ctx.moveTo(sx, railY - 50); ctx.lineTo(sx, railY + 50); ctx.stroke();
        ctx.shadowBlur = 0;
    }

    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.font = 'bold 20px Arial';
    ctx.fillText(`COMBO: ${combo}`, 25, 50);
    ctx.fillStyle = feverLevel === 2 ? '#f00' : (feverLevel === 1 ? '#0ff' : '#444');
    ctx.fillRect(25, 65, Math.min(150, (combo % 11) * 15), 10);

    if (judgmentAlpha > 0) { ctx.save(); ctx.globalAlpha = judgmentAlpha; ctx.textAlign = 'center'; ctx.fillStyle = judgmentText === "PERFECT" ? "#0FF" : "#F00"; ctx.font = `bold 50px Arial`; ctx.fillText(judgmentText, width / 2, judgmentY); ctx.restore(); }
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 26px Arial'; ctx.fillText(Math.ceil(gameTimer) + "s", width/2, 45);

    if(gameState !== 'PLAY') {
        ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#0ff'; ctx.font = '40px Arial'; ctx.textAlign = 'center';
        ctx.fillText(gameState === 'START' ? 'BEAT OR DIE' : 'SYSTEM DOWN', width/2, height/2);
        ctx.fillStyle = '#fff'; ctx.font = '16px Arial'; ctx.fillText('TOUCH TO START', width/2, height/2 + 60);
    }
    ctx.restore();
}

const handleStart = async () => {
    if(gameState !== 'PLAY') {
        setupAudio();
        if(audioCtx.state === 'suspended') await audioCtx.resume();
        gameState = 'PLAY'; score = 0; combo = 0; gameTimer = 60; currentBeat = 4; beatTimer = 0;
        currentPlan = generatePlan(); nextPlan = generatePlan(); enemies = [];
        startTime = audioCtx.currentTime + (BEAT_MS * 4 / 1000); 
        nextAudioBeatTime = audioCtx.currentTime;
    }
};

canvas.addEventListener('pointerdown', (e) => {
    if(gameState !== 'PLAY') { handleStart(); return; }
    touch.startX = e.clientX; touch.startY = e.clientY; touch.active = true; touch.handled = false;
    if(currentBeat < 4) {
        const type = currentPlan[currentBeat].type;
        if(type === 'TAP') checkInput('TAP');
        else if(type === 'HOLD') checkInput('HOLD');
    }
});

canvas.addEventListener('pointermove', (e) => {
    if(!touch.active || touch.handled || currentBeat >= 4) return;
    const dx = e.clientX - touch.startX;
    if(Math.abs(dx) > 40) { checkInput(dx > 0 ? 'SWIPE_R' : 'SWIPE_L'); }
});

canvas.addEventListener('pointerup', () => { touch.active = false; });
canvas.addEventListener('pointercancel', () => { touch.active = false; });

function loop(t) { update(t); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
</html>
