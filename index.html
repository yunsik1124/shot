<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>천국으로 (Towards Heaven) - Ultra Sensitive</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', monospace; 
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none;
        }
        canvas { display: block; margin: 0 auto; image-rendering: pixelated; background: #0a0a0a; width: 100vw; height: 100vh; object-fit: contain; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 10; }
        #deathMessage { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 50px; font-weight: bold; display: none; 
            text-shadow: 0 0 20px #fff, 0 0 30px #00ffff; animation: pulse 0.5s infinite; z-index: 20;
        }
        
        /* 초민감 탭 컨트롤 레이어 */
        #mobileControls {
            position: absolute; bottom: 20px; left: 0; width: 100%; height: 120px;
            z-index: 30; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
        }
        .move-group { display: flex; gap: 10px; pointer-events: auto; }
        .ctrl-btn {
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: #00ffff; font-weight: bold; font-size: 24px; pointer-events: auto;
        }
        .ctrl-btn:active { background: rgba(0, 255, 255, 0.4); transform: scale(0.95); }
        #jumpBtn { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #00ffff; align-self: center; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="stageName">STAGE 1: THE TRIAL</h2>
        <p>DEATHS: <span id="deathCount">0</span></p>
    </div>
    <div id="deathMessage">정화 중...</div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="mobileControls">
        <div class="move-group">
            <div id="leftBtn" class="ctrl-btn">◀</div>
            <div id="rightBtn" class="ctrl-btn">▶</div>
        </div>
        <div id="jumpBtn" class="ctrl-btn">JUMP</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 600;

const player = {
    x: 50, y: 530, w: 20, h: 20, vx: 0, vy: 0,
    speed: 5.5, airSpeed: 4.8, gravity: 0.5, jumpForce: -7.5, maxJumpTime: 22,
    onGround: false, alive: true, canJump: false, jumpInputReady: true 
};

let moveDir = 0; 
let touchJump = false;
let particles = [];
let currentStage = 0;
let deaths = 0;
let isJumping = false;
let jumpTimer = 0;
let keys = {}; 
let gameFrame = 0;

// [스테이지 데이터 생략 - 기존과 동일]
const stages = [
    {
        name: "THE TRIAL",
        platforms: [
            {x: 0, y: 550, w: 200, h: 50}, 
            {x: 320, y: 480, w: 100, h: 20},
            {x: 520, y: 380, w: 100, h: 20, type: 'trigger-hide-y', limitY: 385}, 
            {x: 700, y: 250, w: 100, h: 50},
            {x: 650, y: 450, w: 80, h: 20, type: 'trigger-y-exact', targetY: 450, range: 15, revealed: false} 
        ],
        spikes: [
            {x: 320, y: 460, w: 50, h: 20, type: 'hidden-appear', triggerX: 230}, 
            {x: 0, y: 580, w: 800, h: 20} 
        ],
        goal: {x: 740, y: 210, w: 20, h: 40}
    },
    {
        name: "PRECISION",
        platforms: [
            {x: 0, y: 550, w: 120, h: 50},
            {x: 250, y: 430, w: 300, h: 20},
            {x: 650, y: 550, w: 150, h: 50}
        ],
        spikes: [
            {x: 250, y: 410, w: 300, h: 20, type: 'hidden-appear', triggerX: 300},
            {x: 0, y: 580, w: 800, h: 20}
        ],
        goal: {x: 750, y: 510, w: 20, h: 40}
    },
    {
        name: "THE VOID",
        platforms: [
            {x: 0, y: 550, w: 80, h: 50},
            {x: 150, y: 450, w: 40, h: 20},
            {x: 250, y: 350, w: 40, h: 20},
            {x: 400, y: 350, w: 40, h: 20, type: 'trigger-hide'},
            {x: 550, y: 300, w: 40, h: 20},
            {x: 700, y: 250, w: 80, h: 350}
        ],
        spikes: [
            {x: 250, y: 250, w: 40, h: 20, type: 'hidden-appear', triggerX: 180},
            {x: 550, y: 200, w: 40, h: 20, type: 'hidden-appear', triggerX: 480},
            {x: 0, y: 580, w: 800, h: 20}
        ],
        goal: {x: 740, y: 210, w: 20, h: 40}
    }
];

// --- 초민감 탭 컨트롤 이벤트 ---
const lBtn = document.getElementById('leftBtn');
const rBtn = document.getElementById('rightBtn');
const jBtn = document.getElementById('jumpBtn');

const setupMobileBtn = (btn, dir) => {
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); moveDir = dir; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); if(moveDir === dir) moveDir = 0; });
};

setupMobileBtn(lBtn, -1);
setupMobileBtn(rBtn, 1);

jBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (player.jumpInputReady) {
        player.canJump = true; 
        player.jumpInputReady = false;
        touchJump = true;
    }
});
jBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    player.jumpInputReady = true; 
    player.canJump = false;
    touchJump = false;
});

// [기본 로직 루프는 동일하되, 반응성 보정]
function update() {
    gameFrame++;
    updateParticles();
    if(!player.alive) return;

    let targetVx = 0;
    let currentSpeed = player.onGround ? player.speed : player.airSpeed;
    
    // 키보드와 탭 입력 동시 체크
    if (keys['KeyA'] || keys['ArrowLeft'] || moveDir === -1) targetVx = -currentSpeed;
    else if (keys['KeyD'] || keys['ArrowRight'] || moveDir === 1) targetVx = currentSpeed;
    
    // Lerp 강도를 0.8에서 0.9로 상향 (더 즉각적인 멈춤/출발)
    player.vx += (targetVx - player.vx) * 0.9;

    const jumpPressed = keys['KeyW'] || keys['Space'] || keys['ArrowUp'] || touchJump;
    if (jumpPressed && player.onGround && player.canJump) {
        player.vy = player.jumpForce; player.onGround = false; isJumping = true; jumpTimer = 0; player.canJump = false;
    }
    if (isJumping) {
        if (jumpPressed && jumpTimer < player.maxJumpTime) {
            player.vy -= 0.6; jumpTimer++;
        } else { isJumping = false; }
    }

    player.vy += player.gravity; player.x += player.vx; player.y += player.vy;
    
    // 충돌 처리 및 그리기 로직 (이전 버전과 동일)
    const stage = stages[currentStage];
    player.onGround = false;
    stage.platforms.forEach(p => {
        if(p.hidden || (p.type === 'trigger-y-exact' && !p.revealed)) return;
        if (checkCollision(player, p)) {
            if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 8) {
                player.y = p.y - player.h; player.vy = 0; player.onGround = true;
                if(p.type === 'trigger-hide') setTimeout(()=> p.hidden = true, 250);
            } else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 8) {
                player.y = p.y + p.h; player.vy = 0;
            } else { player.x -= player.vx; }
        }
    });
    stage.spikes.forEach(s => {
        if(s.type === 'hidden-appear') { if(player.x > s.triggerX) s.revealed = true; } 
        else s.revealed = true;
        if (s.revealed && checkCollision(player, s)) die();
    });
    if (checkCollision(player, stage.goal)) {
        currentStage++;
        if (currentStage >= stages.length) { alert("축하합니다! 천국에 도달하셨습니다."); currentStage = 0; deaths = 0; }
        document.getElementById('stageName').innerText = `STAGE ${currentStage + 1}: ${stages[currentStage].name}`;
        resetPlayer();
    }
    if (player.y > canvas.height) die();
}

// [나머지 렌더링 함수들 기존과 동일]
function createAscensionParticles(x, y) { for (let i = 0; i < 20; i++) { particles.push({ x: x + 10, y: y + 10, vx: (Math.random() - 0.5) * 6, vy: -Math.random() * 8 - 2, size: Math.random() * 5 + 2, life: 1.0, color: Math.random() > 0.5 ? '#00ffff' : '#ffffff' }); } }
function updateParticles() { for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02; if (p.life <= 0) particles.splice(i, 1); } }
function die() { if(!player.alive) return; createAscensionParticles(player.x, player.y); player.alive = false; deaths++; document.getElementById('deathCount').innerText = deaths; document.getElementById('deathMessage').style.display = 'block'; setTimeout(resetPlayer, 600); }
function resetPlayer() { player.x = 50; player.y = 530; player.vx = 0; player.vy = 0; player.alive = true; player.onGround = false; document.getElementById('deathMessage').style.display = 'none'; const stage = stages[currentStage]; stage.platforms.forEach(p => { if(p.type && p.type.includes('hide')) p.hidden = false; if(p.type === 'trigger-y-exact') p.revealed = false; }); stage.spikes.forEach(s => s.revealed = false); }
function checkCollision(r1, r2) { const m = 4; return r1.x + m < r2.x + r2.w && r1.x + r1.w - m > r2.x && r1.y + m < r2.y + r2.h && r1.y + r1.h - m > r2.y; }
window.addEventListener('keydown', e => { if ((e.code === 'KeyW' || e.code === 'Space' || e.code === 'ArrowUp') && player.jumpInputReady) { player.canJump = true; player.jumpInputReady = false; } keys[e.code] = true; });
window.addEventListener('keyup', e => { if (e.code === 'KeyW' || e.code === 'Space' || e.code === 'ArrowUp') { player.jumpInputReady = true; player.canJump = false; } keys[e.code] = false; });
function draw() { ctx.clearRect(0, 0, canvas.width, canvas.height); const stage = stages[currentStage]; ctx.fillStyle = bgPattern; ctx.fillRect(0,0,800,600); particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, p.size, p.size); ctx.globalAlpha = 1; }); stage.platforms.forEach(p => { if(p.hidden || (p.type === 'trigger-y-exact' && !p.revealed)) return; ctx.fillStyle = platPattern; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.strokeRect(p.x, p.y, p.w, p.h); }); stage.spikes.forEach(s => { if(!s.revealed) return; const glow = Math.sin(gameFrame * 0.1) * 5 + 5; ctx.shadowBlur = glow; ctx.shadowColor = "#ff3300"; ctx.fillStyle = '#ff2222'; for(let i=0; i<Math.floor(s.w/10); i++) { ctx.beginPath(); ctx.moveTo(s.x+i*10, s.y+s.h); ctx.lineTo(s.x+i*10+5, s.y); ctx.lineTo(s.x+i*10+10, s.y+s.h); ctx.fill(); } ctx.shadowBlur = 0; }); ctx.fillStyle = '#ffdf00'; ctx.shadowBlur = 20; ctx.shadowColor = '#fff'; ctx.beginPath(); ctx.arc(stage.goal.x + stage.goal.w/2, stage.goal.y + stage.goal.h/2, 15, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; if(player.alive) { ctx.fillStyle = '#00ffff'; ctx.fillRect(player.x, player.y, player.w, player.h); ctx.fillStyle = '#000'; ctx.fillRect(player.x+4, player.y+4, 4, 4); ctx.fillRect(player.x+12, player.y+4, 4, 4); } requestAnimationFrame(() => { update(); draw(); }); }
const bgPattern = createBrickPattern('#0a0a1a', '#000000');
const platPattern = createBrickPattern('#444', '#111');
draw();
</script>
</body>
</html>
