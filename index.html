<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Color-Shot v8.8.8 (Performance Optimized)</title>
    <style>
        /* 🎮 모바일 꽉 찬 화면 및 스크롤 바운스 완벽 차단 */
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overscroll-behavior: none;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            width: 360px;
            height: 640px;
            transform-origin: center center;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 360px;
            height: 640px;
            background-color: #e0e7ee;
            overflow: hidden;
            transform: translateZ(0);
            backface-visibility: hidden;
            touch-action: none;
        }

        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1050px;
            height: 640px;
            background-image: url('img/bg_stage_01.png');
            background-size: cover;
            background-repeat: no-repeat;
            will-change: transform;
            z-index: 0;
        }

        canvas {
            display: block;
            width: 360px;
            height: 640px;
            image-rendering: pixelated;
            position: relative;
            z-index: 1;
            background: transparent;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 10px;
            color: #333;
            font-weight: bold;
            font-size: 13px;
            text-shadow: 1px 1px 2px #fff;
        }

        .wind-indicator {
            text-align: center;
            font-size: 15px;
            margin-top: 5px;
            color: #333;
            font-weight: bold;
            text-shadow: 1px 1px 2px #fff;
        }

        #itemBtn {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(135deg, #f39c12, #d35400);
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.1s, opacity 0.3s, background 0.3s;
            border: 2px solid #fff;
            z-index: 20;
        }

            #itemBtn:active {
                transform: scale(0.9);
            }

            #itemBtn.disabled {
                cursor: not-allowed;
                opacity: 0.3;
                filter: grayscale(100%);
            }

            #itemBtn.active {
                background: linear-gradient(135deg, #2ecc71, #27ae60);
                border-color: #fff;
            }

        .virtual-stick-guide {
            position: absolute;
            bottom: 105px;
            right: 20px;
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.5;
            transition: opacity 0.2s;
            z-index: 10;
        }

            .virtual-stick-guide::after {
                content: '';
                width: 34px;
                height: 34px;
                background: #444;
                border-radius: 50%;
                border: 2px solid #222;
            }

        #game-container.dragging .virtual-stick-guide {
            opacity: 1;
            background: rgba(255, 255, 255, 0.3);
        }

        .popup {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            pointer-events: auto;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            touch-action: auto;
        }

            .popup button {
                margin-top: 10px;
                padding: 12px 25px;
                font-size: 15px;
                font-weight: bold;
                border: none;
                background-color: #5b8fb9;
                color: white;
                border-radius: 8px;
                cursor: pointer;
                transition: 0.2s;
            }

                .popup button:active {
                    transform: scale(0.95);
                }

        #menuUI {
            background: transparent;
            justify-content: flex-start;
            padding-top: 80px;
        }

            #menuUI h1 {
                font-size: 36px;
                text-align: center;
                margin-bottom: 5px;
                color: #fff;
            }

            #menuUI .nickname {
                font-size: 14px;
                color: #eee;
                margin-bottom: 40px;
            }

        .menu-btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 60%;
        }

        #shopPopup {
            justify-content: flex-start;
            padding-top: 30px;
        }

        .shop-tabs {
            display: flex;
            width: 90%;
            gap: 5px;
            margin-bottom: 10px;
        }

            .shop-tabs button {
                flex: 1;
                padding: 10px 0;
                font-size: 13px;
                margin-top: 0;
                background-color: #34495e;
                border-radius: 5px 5px 0 0;
            }

                .shop-tabs button.active {
                    background-color: #5b8fb9;
                    border-bottom: 3px solid #fff;
                }

        .shop-list {
            width: 100%;
            max-height: 60%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-overflow-scrolling: touch;
        }

        .shop-item {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            width: 85%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

            .shop-item.locked {
                opacity: 0.5;
                background: rgba(100,100,100,0.2);
            }

        .item-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
            color: #fff;
        }

        .item-desc {
            font-size: 12px;
            color: #ddd;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .ranking-board {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            width: 80%;
            margin: 15px 0;
            border: 1px solid rgba(255,255,255,0.3);
        }

            .ranking-board h3 {
                margin: 0 0 10px 0;
                text-align: center;
                color: #ffd700;
            }

        .rank-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container">
            <div id="bg-layer"></div>
            <canvas id="gameCanvas" width="360" height="640"></canvas>

            <div class="ui-layer" id="inGameUI" style="display:none;">
                <div class="top-bar">
                    <span id="uiNickname">유저명</span>
                    <span id="uiTurn" style="color:#e74c3c;">Turn: 1/10</span>
                    <span>
                        <span id="uiScore" style="margin-right: 8px;">점수: 0</span>
                        <span id="uiGold">💰 0</span>
                    </span>
                </div>
                <div class="wind-indicator" id="uiWind">🌬️ 풍속: 0</div>
                <div class="virtual-stick-guide"></div>
                <div id="itemBtn" onclick="useItem()">
                    <span>정지/x2</span>
                    <span id="itemCount" style="color:#ffeaa7;">0/3</span>
                </div>
            </div>

            <div class="popup" id="menuUI" style="display:flex;">
                <h1>Color-Shot</h1>
                <div class="nickname" id="menuNickname">로딩중...</div>
                <div class="menu-btn-group">
                    <button onclick="startGame()" style="padding: 15px; font-size:18px;">게임 시작</button>
                    <button onclick="openShop()" style="background-color: #9b59b6; padding: 15px;">상점 (무기/타겟/아이템)</button>
                    <button onclick="resetGameData()" style="background-color: #e74c3c; padding: 10px; margin-top: 20px;">데이터 초기화</button>
                </div>
            </div>

            <div class="popup" id="shopPopup">
                <h2 style="margin-top: 0; margin-bottom: 5px;">종합 상점</h2>
                <p id="shopGold" style="margin-bottom: 10px; font-weight:bold; color:#ffd700;">보유 재화: 💰 0</p>
                <div class="shop-tabs">
                    <button id="tabCannon" class="active" onclick="changeShopTab('cannon')">대포</button>
                    <button id="tabTarget" onclick="changeShopTab('target')">타겟(약점)</button>
                    <button id="tabItem" onclick="changeShopTab('item')">소모품</button>
                </div>
                <div class="shop-list" id="shopListContainer"></div>
                <button onclick="closeShop()" style="background-color: #aaa; margin-top: 15px; width:80%;">로비로 돌아가기</button>
            </div>

            <div class="popup" id="resultPopup">
                <h2>게임 종료</h2>
                <p id="resultScorePop" style="margin:5px 0; font-size: 20px; color:#f1c40f;">이번 판 점수: 0</p>
                <p id="resultGoldText" style="margin:5px 0 10px 0; color:#ddd;">누적 보유 재화: 0</p>
                <div class="ranking-board">
                    <h3>🏆 주간 TOP 5 랭킹</h3>
                    <div id="mockRanking"></div>
                </div>
                <button onclick="returnToMenu()" style="padding:15px 40px; background:#e74c3c;">로비로 돌아가기</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        const gameContainer = document.getElementById('game-container');
        const bgLayer = document.getElementById('bg-layer');

        // ★ [최적화 1] DOM 캐싱 (실시간 탐색 방지)
        const UI_CACHE = {
            score: document.getElementById('uiScore'),
            gold: document.getElementById('uiGold')
        };

        const ASSETS = { images: {}, sounds: {} };
        const PI_180 = Math.PI / 180;

        function loadImage(key, path) {
            let img = new Image();
            img.onload = () => { img.ready = true; };
            img.src = `img/${path}`;
            ASSETS.images[key] = img;
        }
        function loadSound(key, path) {
            let audio = new Audio(`sound/${path}`);
            ASSETS.sounds[key] = audio;
        }

        loadImage('ground_start', 'ground_start.png');
        loadImage('ground_end', 'ground_end.png');

        loadSound('bgm', 'bgm_battle_loop.mp3');
        loadSound('shoot', 'sfx_shoot_normal.wav');
        loadSound('hit_rock', 'sfx_hit_rock.wav');
        loadSound('break_rock', 'sfx_break_rock.wav');
        loadSound('hit_metal', 'sfx_hit_metal.wav');
        loadSound('break_metal', 'sfx_break_metal.wav');
        loadSound('buff', 'sfx_pass_buff.wav');

        const audioThrottle = {};
        function playSound(key) {
            let audio = ASSETS.sounds[key];
            if (!audio || audio.readyState < 2) return;

            if (key === 'bgm') return;

            const now = Date.now();
            if (audioThrottle[key] && now - audioThrottle[key] < 100) return;
            audioThrottle[key] = now;

            audio.currentTime = 0;
            audio.play().catch(e => { });
        }

        const CAMERA = { shakeFrames: 0, shakeIntensity: 0 };
        function triggerShake(intensity, frames) { CAMERA.shakeIntensity = intensity; CAMERA.shakeFrames = frames; }

        const GAME = {
            state: 'menu', turn: 1, maxTurns: 10, totalDamage: 0, gold: 0,
            nickname: "", wind: 0, cameraX: 0, worldWidth: 850, turnWaiting: false, itemActive: false,
            _lastDmg: -1, _lastGold: -1
        };
        const PHYSICS = { gravity: 0.05, windMulti: 0.0025 };

        let floatingTexts = []; let projectiles = []; let windParticles = []; let hitParticles = [];

        const CANNONS = {
            normal: { id: 'normal', name: "노멀 대포", baseDmg: 100, radius: 12, color: "#FFFFFF", unlockCost: 0 },
            sniper: { id: 'sniper', name: "스나이퍼 대포", baseDmg: 140, radius: 5, color: "#FF3333", unlockCost: 500 },
            buster: { id: 'buster', name: "버스터 대포", baseDmg: 80, radius: 20, color: "#3388FF", unlockCost: 1000 }
        };

        const TARGET_TYPES = {
            size1: { id: 'size1', name: 'Size 1', weakRadius: 25, cost: 0, imgKey: 'core_s1' },
            size2: { id: 'size2', name: 'Size 2', weakRadius: 30, cost: 1000, imgKey: 'core_s2' },
            size3: { id: 'size3', name: 'Size 3', weakRadius: 35, cost: 3000, imgKey: 'core_s3' },
            size4: { id: 'size4', name: 'Size 4', weakRadius: 45, cost: 7000, imgKey: 'core_s4' },
            size5: { id: 'size5', name: 'Size 5', weakRadius: 50, cost: 15000, imgKey: 'core_s5' }
        };

        const player = {
            x: 50, y: 550, angle: -45, power: 10, powerDir: 1, isDragging: false,
            slot2Unlocked: false,
            equipped: { slot1: 'normal', slot2: null },
            cannons: { normal: { level: 1, unlocked: true }, sniper: { level: 1, unlocked: false }, buster: { level: 1, unlocked: false } },
            targetEquipped: 'size1', targets: { size1: true, size2: false, size3: false, size4: false, size5: false },
            items: { tactical: 3 }
        };

        const SLOTS = { slot1: { x: 25, y: 525 }, slot2: { x: 75, y: 575 } };

        let currentShopTab = 'cannon';
        let bZone = { x: 280, width: 40, dir: 1, speed: 0.4, minX: 200, maxX: 380, segments: [], obstacleBlocks: [] };
        let cZone = { x: 500, y: 300, width: 25, height: 120, dir: 1, speed: 0.8, minY: 100, maxY: 480, segments: [{ type: 'goldMult', text: '💰 x2', color: 'rgba(50, 255, 50, 0.5)', yOff: 0, h: 60 }, { type: 'qty4', text: 'x4', color: 'rgba(255, 215, 0, 0.6)', yOff: 60, h: 60 }] };
        let targetBlocks = []; const weakPoint = { x: 630, y: 510 };

        function initTarget() {
            targetBlocks = [];
            const getRandomHP = () => Math.random() > 0.3 ? 1 : 2;
            const r = TARGET_TYPES[player.targetEquipped].weakRadius;
            const startX = weakPoint.x + r - 5;

            for (let c = 0; c < 5; c++) { for (let r = 0; r < 10; r++) { targetBlocks.push({ x: startX + c * 20, y: weakPoint.y - 120 + r * 20, w: 20, h: 20, hp: getRandomHP() }); } }
            const topY = weakPoint.y - 120;
            for (let c = 0; c < 12; c++) { targetBlocks.push({ x: (startX - 180) + c * 20, y: topY, w: 20, h: 20, hp: getRandomHP() }); }
            for (let c = 0; c < 3; c++) { targetBlocks.push({ x: weakPoint.x + (r / 2) + c * 20, y: weakPoint.y - 10, w: 20, h: 20, hp: getRandomHP() }); }
        }

        function loadLocalData() {
            let savedName = localStorage.getItem("colorShot_nick");
            if (!savedName) {
                savedName = "Player_" + Math.floor(Math.random() * 9999);
                localStorage.setItem("colorShot_nick", savedName);
                localStorage.setItem("colorShot_items", JSON.stringify(player.items));
            }
            GAME.nickname = savedName;
            if (localStorage.getItem("colorShot_gold")) GAME.gold = parseInt(localStorage.getItem("colorShot_gold"));
            if (localStorage.getItem("colorShot_cannons")) player.cannons = JSON.parse(localStorage.getItem("colorShot_cannons"));
            if (localStorage.getItem("colorShot_equipped")) {
                let eq = localStorage.getItem("colorShot_equipped");
                if (eq.startsWith("{")) player.equipped = JSON.parse(eq); else player.equipped = { slot1: eq, slot2: null };
            }
            if (localStorage.getItem("colorShot_slot2Unlocked")) player.slot2Unlocked = localStorage.getItem("colorShot_slot2Unlocked") === 'true';
            if (localStorage.getItem("colorShot_targets")) player.targets = JSON.parse(localStorage.getItem("colorShot_targets"));
            if (localStorage.getItem("colorShot_targetEquipped")) player.targetEquipped = localStorage.getItem("colorShot_targetEquipped");
            if (localStorage.getItem("colorShot_items")) player.items = JSON.parse(localStorage.getItem("colorShot_items"));
        }

        function saveLocalData() {
            localStorage.setItem("colorShot_gold", GAME.gold);
            localStorage.setItem("colorShot_cannons", JSON.stringify(player.cannons));
            localStorage.setItem("colorShot_equipped", JSON.stringify(player.equipped));
            localStorage.setItem("colorShot_slot2Unlocked", player.slot2Unlocked);
            localStorage.setItem("colorShot_targets", JSON.stringify(player.targets));
            localStorage.setItem("colorShot_targetEquipped", player.targetEquipped);
            localStorage.setItem("colorShot_items", JSON.stringify(player.items));
        }

        function resetGameData() { if (confirm("모든 게임 데이터가 초기화됩니다.\n초기화 하시겠습니까?")) { localStorage.clear(); location.reload(); } }

        function generateBZone() {
            bZone.segments = []; bZone.obstacleBlocks = [];
            for (let c = 0; c < 2; c++) { for (let r = 0; r < 4; r++) { bZone.obstacleBlocks.push({ relX: c * 20, y: r * 20, w: 20, h: 20, hp: 2 }); } }
            let midTypes = [{ id: 'qty4', text: '개수 x4', color: 'rgba(255, 215, 0, 0.6)' }, { id: 'qty2', text: '개수 x2', color: 'rgba(0, 191, 255, 0.6)' }, { id: 'dmg4', text: '파워 x4', color: 'rgba(255, 100, 100, 0.6)' }, { id: 'dmg2', text: '파워 x2', color: 'rgba(255, 160, 160, 0.6)' }].sort(() => Math.random() - 0.5);
            let currY = 80;
            for (let i = 0; i < 4; i++) { bZone.segments.push({ ...midTypes[i], y: currY, height: 75 }); currY += 75; }
            for (let c = 0; c < 2; c++) { for (let r = 0; r < 13; r++) { bZone.obstacleBlocks.push({ relX: c * 20, y: 380 + r * 20, w: 20, h: 20, hp: 2 }); } }
        }

        function initWindParticles() {
            windParticles = [];
            let count = Math.abs(GAME.wind) * 3;
            for (let i = 0; i < count; i++) { windParticles.push({ x: Math.random() * GAME.worldWidth, y: Math.random() * 640, speed: (Math.random() * 2 + 1), length: Math.random() * 15 + 5 }); }
        }

        function addFloatingText(x, y, text, color) {
            if (floatingTexts.length > 20) return;
            floatingTexts.push({ x, y, text, color, life: 60 });
        }

        function createHitParticles(x, y, mainColor) {
            if (hitParticles.length > 30) return;
            const colors = [mainColor, "#ecf0f1", "#bdc3c7"];
            for (let i = 0; i < 8; i++) { hitParticles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8 - 2, life: 30 + Math.random() * 20, color: colors[Math.floor(Math.random() * colors.length)], size: Math.random() * 4 + 2 }); }
        }

        function useItem() {
            if (GAME.state !== 'aiming' || player.items.tactical <= 0) return;
            if (GAME.itemActive) {
                GAME.itemActive = false; initTurnEnvironment(); addFloatingText(player.x, player.y - 40, "아이템 취소", "#fff");
            } else {
                GAME.itemActive = true; GAME.wind = 0; document.getElementById('uiWind').innerText = `🌬️ 날씨: 멈춤 (아이템 대기 중)`;
                initWindParticles(); addFloatingText(player.x, player.y - 40, "정지 & x2 활성!", "#f39c12");
            }
            updateUITurnAndItems();
        }

        function changeShopTab(tab) {
            currentShopTab = tab;
            document.querySelectorAll('.shop-tabs button').forEach(btn => btn.classList.remove('active'));
            if (tab === 'cannon') document.getElementById('tabCannon').classList.add('active');
            if (tab === 'target') document.getElementById('tabTarget').classList.add('active');
            if (tab === 'item') document.getElementById('tabItem').classList.add('active');
            renderShopUI();
        }

        function renderShopUI() {
            document.getElementById('shopGold').innerText = `보유 재화: 💰 ${GAME.gold}`;
            const container = document.getElementById('shopListContainer'); container.innerHTML = '';
            if (currentShopTab === 'cannon') {
                if (!player.slot2Unlocked) {
                    let div = document.createElement('div'); div.className = `shop-item`;
                    div.innerHTML = `<div class="item-name">🔒 추가 대포 슬롯 2</div><div class="item-desc">해금비용: 1000G</div><div class="btn-group"><button onclick="buySlot2()" style="background:#e67e22; width: 100%;">슬롯 해금 (1000G)</button></div>`;
                    container.appendChild(div);
                }
                Object.keys(CANNONS).forEach(key => {
                    let cData = CANNONS[key]; let pData = player.cannons[key];
                    let isEq1 = (player.equipped.slot1 === key); let isEq2 = (player.equipped.slot2 === key);
                    let cost = pData.level * 100;
                    let div = document.createElement('div'); div.className = `shop-item ${!pData.unlocked ? 'locked' : ''}`;
                    let title = pData.unlocked ? `${cData.name} (Lv.${pData.level})` : `🔒 ${cData.name}`;
                    if (isEq1) title += " <span style='color:#2ecc71;'>[슬롯 1]</span>"; if (isEq2) title += " <span style='color:#3498db;'>[슬롯 2]</span>";
                    let html = `<div class="item-name">${title}</div><div class="item-desc">기본 데미지: ${cData.baseDmg} / ${!pData.unlocked ? `해금비용: ${cData.unlockCost}G` : '해금완료'}</div><div class="btn-group">`;
                    if (!pData.unlocked) html += `<button onclick="buyFeature('cannon', '${key}', ${cData.unlockCost})">해금하기</button>`;
                    else {
                        if (!isEq1) html += `<button onclick="equipCannon('${key}', 'slot1')" style="background:#27ae60;">숫자 1 장착</button>`;
                        if (player.slot2Unlocked && !isEq2) html += `<button onclick="equipCannon('${key}', 'slot2')" style="background:#2980b9;">숫자 2 장착</button>`;
                        else if (!player.slot2Unlocked) html += `<button style="background:#555;" disabled>숫자 2 잠김</button>`;
                        if (pData.level < 10) html += `<button onclick="upgradeCannon('${key}', ${cost})">강화 (${cost}G)</button>`; else html += `<button style="background:#555;" disabled>MAX LV</button>`;
                    }
                    html += `</div>`; div.innerHTML = html; container.appendChild(div);
                });

        function openShop() { document.getElementById('menuUI').style.display = 'none'; document.getElementById('shopPopup').style.display = 'flex'; renderShopUI(); }

        function updatePhysics() {
            if (CAMERA.shakeFrames > 0) CAMERA.shakeFrames--;
            bZone.x += bZone.speed * bZone.dir; if (bZone.x < bZone.minX || bZone.x > bZone.maxX) bZone.dir *= -1;
            cZone.y += cZone.speed * cZone.dir; if (cZone.y < cZone.minY || cZone.y + cZone.height > cZone.maxY) cZone.dir *= -1;

            // ★ [최적화 3-1] 배열 삭제 O(1) 스왑 방식 적용
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i]; ft.y -= 1; ft.life--;
                if (ft.life <= 0) {
                    floatingTexts[i] = floatingTexts[floatingTexts.length - 1];
                    floatingTexts.pop();
                }
            }

            // ★ [최적화 3-2] 배열 삭제 O(1) 스왑 방식 적용
            for (let i = hitParticles.length - 1; i >= 0; i--) {
                let p = hitParticles[i];
                p.vy += PHYSICS.gravity; p.x += p.vx; p.y += p.vy; p.life--;
                if (p.life <= 0) {
                    hitParticles[i] = hitParticles[hitParticles.length - 1];
                    hitParticles.pop();
                }
            }

            if (player.isDragging) { if (player.powerDir > 0) { player.power += 0.075; if (player.power >= 18) { player.power = 18; player.powerDir = 0; } } }

            bgLayer.style.transform = `translate3d(${-GAME.cameraX * 0.2}px, 0, 0)`;

            if (GAME.state === 'returning') {
                GAME.cameraX -= 12;
                if (GAME.cameraX <= 0) {
                    GAME.cameraX = 0;
                    GAME.turn++;
                    if (GAME.turn > GAME.maxTurns) endGame();
                    else initTurnEnvironment();
                }
            }

            if (GAME.state === 'flying') {
                let activeCount = 0; let leaderX = 0;
                for (let i = 0; i < projectiles.length; i++) {
                    let p = projectiles[i]; if (!p.active) continue;
                    activeCount++; if (p.x > leaderX) leaderX = p.x;
                    p.vy += PHYSICS.gravity; p.vx += (GAME.wind * PHYSICS.windMulti); p.x += p.vx; p.y += p.vy;
                    if (p.y > canvas.height || p.x > GAME.worldWidth) { p.active = false; continue; }

                    if (p.x + p.radius > bZone.x && p.x - p.radius < bZone.x + bZone.width) {
                        let hitObstacle = false;
                        for (let j = bZone.obstacleBlocks.length - 1; j >= 0; j--) {
                            let ob = bZone.obstacleBlocks[j]; let obX = bZone.x + ob.relX;
                            let closestX = Math.max(obX, Math.min(p.x, obX + ob.w)); let closestY = Math.max(ob.y, Math.min(p.y, ob.y + ob.h));

                            let distX = p.x - closestX; let distY = p.y - closestY;
                            if ((distX * distX) + (distY * distY) <= (p.radius * p.radius)) {
                                hitObstacle = true; ob.hp -= 1; p.active = false;
                                playSound('hit_metal'); triggerShake(6, 10);
                                if (ob.hp <= 0) { addFloatingText(obX, p.y, "파괴됨!", "#e74c3c"); createHitParticles(p.x, p.y, "#7f8c8d"); playSound('break_metal'); bZone.obstacleBlocks.splice(j, 1); }
                                else { addFloatingText(obX, p.y, "흠집!", "#f39c12"); createHitParticles(p.x, p.y, "#95a5a6"); }
                                break;
                            }
                        }
                        if (!p.active) continue;
                        if (!hitObstacle && !p.passedBZone) {
                            let hitSegment = null;
                            for (let k = 0; k < bZone.segments.length; k++) {
                                if (p.y >= bZone.segments[k].y && p.y <= bZone.segments[k].y + bZone.segments[k].height) {
                                    hitSegment = bZone.segments[k]; break;
                                }
                            }
                            if (hitSegment) {
                                p.passedBZone = true; playSound('buff');
                                if (hitSegment.id.includes('qty')) {
                                    let cloneCount = hitSegment.id === 'qty4' ? 4 : 2;
                                    if (projectiles.length > 25) cloneCount = 1;
                                    addFloatingText(bZone.x, p.y - 20, hitSegment.text, hitSegment.color);
                                    for (let j = 1; j < cloneCount; j++) { projectiles.push({ x: p.x, y: p.y, vx: p.vx + (Math.random() - 0.5) * 1.5, vy: p.vy + (Math.random() - 0.5) * 1.5, active: true, radius: p.radius, bMult: p.bMult, bType: p.bType, gMult: p.gMult, passedBZone: true, passedCZone: p.passedCZone, baseDmg: p.baseDmg, pLevel: p.pLevel, color: p.color }); }
                                } else { p.bMult = parseInt(hitSegment.id.replace(/[^0-9]/g, '')); p.bType = 'dmg'; addFloatingText(bZone.x, p.y - 20, hitSegment.text, hitSegment.color); }
                            }
                        }
                    }

                    if (!p.passedCZone && p.x > cZone.x && p.x < cZone.x + cZone.width && p.y > cZone.y && p.y < cZone.y + cZone.height) {
                        p.passedCZone = true; let relY = p.y - cZone.y;
                        let hitSeg = null;
                        for (let k = 0; k < cZone.segments.length; k++) {
                            if (relY >= cZone.segments[k].yOff && relY <= cZone.segments[k].yOff + cZone.segments[k].h) {
                                hitSeg = cZone.segments[k]; break;
                            }
                        }

                        if (hitSeg) {
                            playSound('buff');
                            if (hitSeg.type === 'goldMult') { p.gMult = 2; addFloatingText(cZone.x, p.y - 20, `💰 x2`, "#0f0"); }
                            else if (hitSeg.type === 'qty4') {
                                let cloneCount = projectiles.length > 25 ? 1 : 4;
                                addFloatingText(cZone.x, p.y - 20, "C존 개수 x4", hitSeg.color);
                                for (let j = 1; j < cloneCount; j++) { projectiles.push({ x: p.x, y: p.y, vx: p.vx + (Math.random() - 0.5) * 2, vy: p.vy + (Math.random() - 0.5) * 2, active: true, radius: p.radius, bMult: p.bMult, bType: p.bType, gMult: p.gMult, passedBZone: true, passedCZone: true, baseDmg: p.baseDmg, pLevel: p.pLevel, color: p.color }); }
                            }
                        }
                    }

                    let hasHitAnyBlock = false;
                    for (let j = targetBlocks.length - 1; j >= 0; j--) {

                            triggerShake(15, 15); createHitParticles(p.x, p.y, p.color); addFloatingText(p.x, p.y - 15, `💥 Critical! ${finalDamage}`, "#ff00ff");
                        }

                }

                // ★ [최적화 3-3] 배열 삭제 O(1) 스왑 방식 적용
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    if (!projectiles[i].active) {

                if (activeCount > 0) GAME.cameraX = Math.max(0, Math.min(leaderX - 180, GAME.worldWidth - canvas.width));

                if (activeCount === 0 && !GAME.turnWaiting) {

        }

        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let sx = 0; let sy = 0;
            if (CAMERA.shakeFrames > 0) { sx = (Math.random() - 0.5) * CAMERA.shakeIntensity; sy = (Math.random() - 0.5) * CAMERA.shakeIntensity; }

            if (GAME.state === 'menu') GAME.cameraX = 0;
            ctx.save(); ctx.translate(-GAME.cameraX + sx, sy);

            let camLeft = GAME.cameraX;
            let camRight = GAME.cameraX + canvas.width;

            if (GAME.wind !== 0 && GAME.state !== 'menu') {
                ctx.strokeStyle = "#b0bec5"; ctx.lineWidth = 1.5; ctx.beginPath();
                windParticles.forEach(wp => {
                    let dir = GAME.wind > 0 ? 1 : -1; wp.x += (wp.speed * dir);
                    if (dir > 0 && wp.x > GAME.worldWidth) wp.x = 0; if (dir < 0 && wp.x < 0) wp.x = GAME.worldWidth;
                    ctx.moveTo(wp.x, wp.y); ctx.lineTo(wp.x + (wp.length * dir), wp.y + 2);
                });
                ctx.stroke();
            }

            let gStart = ASSETS.images.ground_start;
            if (gStart && gStart.ready) { ctx.drawImage(gStart, 0, 520, 300, 120); }
            else { ctx.fillStyle = "#c5d3df"; ctx.beginPath(); ctx.moveTo(0, 550); ctx.quadraticCurveTo(150, 520, 300, 640); ctx.lineTo(0, 640); ctx.fill(); }

            let gEnd = ASSETS.images.ground_end;
            if (gEnd && gEnd.ready) { ctx.drawImage(gEnd, 500, 480, 350, 160); }
            else { ctx.fillStyle = "#c5d3df"; ctx.beginPath(); ctx.moveTo(500, 640); ctx.quadraticCurveTo(650, 480, 850, 550); ctx.lineTo(850, 640); ctx.fill(); }

            bZone.segments.forEach(s => {
                ctx.fillStyle = s.color; ctx.fillRect(bZone.x, s.y, bZone.width, s.height);
                ctx.fillStyle = "#fff"; ctx.font = "11px Arial"; ctx.fillText(s.text, bZone.x + 2, s.y + s.height / 2);
            });

            bZone.obstacleBlocks.forEach(ob => {
                let obX = bZone.x + ob.relX;
                if (obX > camRight + 20 || obX + ob.w < camLeft - 20) return;
                ctx.fillStyle = ob.hp === 2 ? "#556b2f" : "#7b8d42";
                ctx.fillRect(obX, ob.y, ob.w, ob.h);
            });

            cZone.segments.forEach(s => {
                ctx.fillStyle = s.color; ctx.fillRect(cZone.x, cZone.y + s.yOff, cZone.width, s.h);
                ctx.fillStyle = "#fff"; ctx.font = "12px Arial"; ctx.fillText(s.text, cZone.x + 2, cZone.y + s.yOff + s.h / 2 + 5);
            });

            if (GAME.state === 'aiming') {
                let vX = GAME.cameraX + 350;
                ctx.fillStyle = "rgba(255, 255, 255, 0.1)"; ctx.fillRect(vX, cZone.minY, 7, 380);
                cZone.segments.forEach(s => { ctx.fillStyle = s.color; ctx.fillRect(vX, cZone.y + s.yOff, 7, s.h); });
            }

            targetBlocks.forEach(b => {
                if (b.x > camRight + 20 || b.x + b.w < camLeft - 20) return;
                ctx.fillStyle = b.hp === 2 ? "#4a5a6a" : "#6c7a89";
                ctx.fillRect(b.x, b.y, b.w, b.h);
            });

            let tData = TARGET_TYPES[player.targetEquipped]; let r = tData.weakRadius;
            ctx.fillStyle = "#8a2be2"; ctx.beginPath(); ctx.arc(weakPoint.x, weakPoint.y, r, 0, Math.PI * 2); ctx.fill();

            ctx.font = "bold 12px Arial"; ctx.fillStyle = "#000"; ctx.fillText(tData.name, weakPoint.x - 17, weakPoint.y + r + 16);
            ctx.fillStyle = "#fff"; ctx.fillText(tData.name, weakPoint.x - 18, weakPoint.y + r + 15);

            function drawCannon(slotKey, cId) {
                let slotPos = SLOTS[slotKey];
                if (slotKey === 'slot2' && !player.slot2Unlocked) {
                    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.beginPath(); ctx.arc(slotPos.x, slotPos.y, 18, 0, Math.PI * 2); ctx.fill();
                    ctx.font = "16px Arial"; ctx.textAlign = "center"; ctx.fillStyle = "#fff"; ctx.fillText("🔒", slotPos.x, slotPos.y + 6); ctx.textAlign = "left"; return;
                }
                if (!cId) { ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.arc(slotPos.x, slotPos.y, 18, 0, Math.PI * 2); ctx.fill(); return; }

                let cData = CANNONS[cId]; let pLevel = player.cannons[cId].level;

                ctx.save(); ctx.translate(slotPos.x, slotPos.y); ctx.rotate(player.angle * PI_180);
                ctx.fillStyle = "#1a252f"; ctx.fillRect(0, -8, 35, 16);
                ctx.restore();

                ctx.fillStyle = cData.color; ctx.beginPath(); ctx.arc(slotPos.x, slotPos.y, 18, 0, Math.PI * 2); ctx.fill();

                ctx.font = "bold 13px Arial"; ctx.textAlign = "center";
                ctx.fillStyle = "#000"; ctx.fillText(`Lv.${pLevel}`, slotPos.x + 1, slotPos.y + 36); ctx.fillStyle = "#fff"; ctx.fillText(`Lv.${pLevel}`, slotPos.x, slotPos.y + 35);
                ctx.font = "bold 11px Arial"; ctx.fillStyle = "#000"; ctx.fillText(`[${slotKey === 'slot1' ? '1' : '2'}]`, slotPos.x + 1, slotPos.y - 23);
                ctx.fillStyle = "#ffd700"; ctx.fillText(`[${slotKey === 'slot1' ? '1' : '2'}]`, slotPos.x, slotPos.y - 24); ctx.textAlign = "left";
            }

            drawCannon('slot1', player.equipped.slot1); drawCannon('slot2', player.equipped.slot2);

            if (player.isDragging) {
                ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(player.x - 60, player.y - 55, 120, 8);
                let pRatio = (player.power - 10) / 8;
                ctx.fillStyle = `rgb(${255 * pRatio}, ${255 * (1 - pRatio)}, 0)`; ctx.fillRect(player.x - 60, player.y - 55, 120 * pRatio, 8);
            }

            // ★ [최적화 4] 투사체를 비싼 원형 렌더링(arc)에서 사각형 렌더링(fillRect)으로 교체
            projectiles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            hitParticles.forEach(p => {
                let curSize = p.size * (p.life / 50);
                if (curSize > 0) {
                    ctx.fillStyle = p.color; ctx.fillRect(p.x - curSize / 2, p.y - curSize / 2, curSize, curSize);
                }
            });

            if (floatingTexts.length > 0) {
                ctx.font = "bold 16px Arial";
                floatingTexts.forEach(ft => {
                    ctx.globalAlpha = ft.life / 60;
                    ctx.fillStyle = "#000"; ctx.fillText(ft.text, ft.x + 1, ft.y + 1);
                    ctx.fillStyle = ft.color; ctx.fillText(ft.text, ft.x, ft.y);
                });
                ctx.globalAlpha = 1.0;
            }

            ctx.restore();
        }

        window.onload = function () { init(); };
    </script>
</body>
</html>
